# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'
        
    - name: Setup dependencies
      run: go get .

    - name: Build x64 linux
      run: env GOOS=linux GOARCH=amd64 go build -v -o r3 -ldflags="-v -s -X 'main.appVersion‎=3.12.01.0001' -X 'main.appVersionClient‎=3.12.01.0001'"

    #- name: List NM
    #  run: go tool nm r3 > nmlist.txt

    #- name: Build x64 windows
    #  run: env GOOS=windows GOARCH=amd64 go build -v -o r3.exe -ldflags "-v -X main.appVersion‎=3.12.01.0001 -X main.appVersionClient‎=3.12.01.0001"

    - name: upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name:
          r3
        path: |
          r3
          #r3.exe
          #nmlist.txt
