# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.1'
        
    - name: Setup dependencies
      run: go get .

    - name: Build x64 linux
      run: env GOOS=linux GOARCH=amd64 go build -v -o r3 -ldflags="-s -w -X 'main.appVersion‎="3.12.01"' -X 'main.appVersionClient‎="3.12.01"'"
      # run: go build -o app -ldflags="-X 'main.Version=v1.0.0' -X 'main.CommitSHA=$(git rev-parse --short HEAD)' -X 'main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)'"

    - name: Build x64 windows
      run: env GOOS=windows GOARCH=amd64 go build -v -o r3.exe -ldflags="-s -w -X 'main.appVersion‎="3.12.01"' -X 'main.appVersionClient‎="3.12.01"'"

    - name: upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: r3
        path: r3
        name: r3.exe
        path: r3.exe
